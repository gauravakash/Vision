version: '3.8'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: xagent-backend-local
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/xagent.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - xagent-network-local

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: xagent-frontend-local
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - xagent-network-local

  nginx:
    image: nginx:alpine
    container_name: xagent-nginx-local
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - xagent-network-local

networks:
  xagent-network-local:
    driver: bridge
